<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodlemon Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--sky:#79B9F6;--ink:#2B2B3F;--pink:#F8A7D8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;color:var(--ink);
    background:linear-gradient(180deg,#8FCBF2,#6FB2EF);min-height:100svh}
  header{text-align:center;padding:26px 18px 8px}
  h1{font-family:'Baloo 2',cursive;font-weight:800;color:#fff;font-size:clamp(1.8rem,7vw,2.4rem);text-shadow:0 3px 0 rgba(43,43,63,.22)}
  .sub{color:#EAF4FF;font-weight:700;margin-top:6px}
  .back{display:inline-block;margin:14px auto 0;background:#fff;color:var(--ink);
    font-family:'Baloo 2',cursive;font-weight:700;text-decoration:none;border-radius:999px;
    padding:10px 20px;box-shadow:0 4px 0 rgba(43,43,63,.25)}
  .grid{max-width:900px;margin:22px auto;padding:0 14px 60px;
    display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
  .card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(43,43,63,.18)}
  .card img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
  .card .h{padding:8px 10px;font-weight:800;font-size:.82rem;color:var(--ink)}
  .empty,.loading{color:#fff;font-weight:800;text-align:center;padding:50px 18px}
</style>
</head>
<body>
<header>
  <h1>🫧 Doodlemon Gallery</h1>
  <p class="sub">Every trainer who caught theirs</p><br>
  <a class="back" href="/">← Make yours</a>
</header>
<div class="loading" id="loading">Loading the dex…</div>
<div class="grid" id="grid"></div>
<script>
fetch('/api/gallery').then(r=>r.json()).then(d=>{
  const grid=document.getElementById('grid'),loading=document.getElementById('loading');
  loading.style.display='none';
  const items=(d&&d.items)||[];
  if(!items.length){grid.innerHTML='<p class="empty" style="grid-column:1/-1">No Doodlemon yet — be the first!</p>';return;}
  grid.innerHTML=items.map(it=>
    '<div class="card"><img loading="lazy" src="'+it.image_url+'" alt="Doodlemon"><div class="h">@'+escapeHtml(it.handle)+'</div></div>'
  ).join('');
}).catch(()=>{
  document.getElementById('loading').textContent='Could not load the gallery.';
});
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
